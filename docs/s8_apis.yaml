openapi: 3.0.3
info:
  title: Straight Lines Creative Design Platform APIs
  description: |-
    This is a subset of the APIs available for the Straight Lines Creative Design Platform based on the OpenAPI 3.0 specification.  
    
    Some useful links:
    - [Straight Lines Web Site](https://www.str8lines.com)
    - [Example Integrations](https://github.com/str8lines/ai-integration-examples)
  contact:
    email: support@str8lines.com
  version: 1.0.0
servers:
  - url: https://ai-staging.str8lines.com/
tags:
  - name: collection
    description: Everything related to collections.
  - name: color
    description: Everything related to colors.
  - name: image
    description: Everything related to the images.
  - name: marketing_asset
    description: Everything related to marketing assets.

paths:
  /collection:
    get:
      tags:
        - collection
      summary: Query for collections
      description: Retrieve a list of collections
      operationId: findCollectoins
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collection'
        '400':
          description: Invalid id
  /collection/{collectionId}:
    parameters:
      - name: collectionId
        in: path
        description: ID of record to return
        required: true
        schema:
          type: string
    patch:
      tags:
        - collection
      summary: Update an existing collection
      description: Update an existing collection by Id
      operationId: updateCollection
      requestBody:
        description: Update an collection
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Collection'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'
        '400':
          description: Invalid ID supplied
        '401':
          description: Not authorized
    get:
      tags:
        - color
      summary: Get color by id
      description: Retrieve a specific color
      operationId: findCollectionById
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Color'
        '400':
          description: Invalid id
  /color:
    get:
      tags:
        - color
      summary: Query for colors
      description: Retrieve a list of colors
      operationId: findColors
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Color'
        '400':
          description: Invalid id
  /color/{colorId}:
    parameters:
      - name: colorId
        in: path
        description: ID of color to return
        required: true
        schema:
          type: string
    patch:
      tags:
        - color
      summary: Update an existing color
      description: Update an existing color by Id
      operationId: updateColor
      requestBody:
        description: Update an color
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Color'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Color'
        '400':
          description: Invalid ID supplied
        '401':
          description: Not authorized
    get:
      tags:
        - color
      summary: Get color by id
      description: Retrieve a specific color
      operationId: findColorById
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Color'
        '400':
          description: Invalid id
  /image/{imageId}:
    parameters:
      - name: imageId
        in: path
        description: ID of image to return
        required: true
        schema:
          type: integer
          format: int64
    patch:
      tags:
        - image
      summary: Update an existing image
      description: Update an existing image by Id
      operationId: updateImage
      requestBody:
        description: Update an image
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Image'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          description: Invalid ID supplied
        '401':
          description: Not authorized
    get:
      tags:
        - image
      summary: Retrieve a specific image by id
      description: Get the single image
      operationId: findImageById
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        '400':
          description: Invalid id
  /image:
    get:
      tags:
        - image
      summary: Find images by specified criteria
      description: An image may be the 'parent' that contains many scenarios, or it may be a 'child' where it resides within a scenario of a parent image.  For parent only queries, include the 'is_option eq False' criteria
      operationId: findImages
      parameters:
        - name: filter_param
          in: query
          description: Limit the returned results using specified criteria
          required: false
          schema:
            type: string
        - name: children_limit
          in: query
          description: Limit the URLs generated for children images for better performance
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        '400':
          description: Invalid status value

  /marketing_asset/{assetId}:
    parameters:
      - name: assetId
        in: path
        description: ID of marketing asset to return
        required: true
        schema:
          type: string
    patch:
      tags:
        - marketing_asset
      summary: Update an existing asset
      description: Update an existing asset by Id
      operationId: updateAsset
      requestBody:
        description: Update an asset
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketingAsset'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketingAsset'
        '400':
          description: Invalid ID supplied
        '401':
          description: Not authorized
    get:
      tags:
        - marketing_asset
      summary: Retrieve a specific asset by id
      description: Get the single asset
      operationId: findAssetById
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MarketingAsset'
        '400':
          description: Invalid id
    delete:
      tags:
        - marketing_asset
      summary: Delete a specific asset by id
      description: Delete the single asset
      operationId: deleteAsset
      responses:
        '200':
          description: successful operation
        '400':
          description: Invalid id
  /marketing_asset/{assetId}/upload_single:
    parameters:
      - name: assetId
        in: path
        description: ID of marketing asset to return
        required: true
        schema:
          type: string
    post:
      tags:
        - marketing_asset
      summary: Upload the source photo to the asset to be converted
      description: Upload a file to a marketing asset
      operationId: uploadAsset
      requestBody:
        description: Upload a 3d rendering to an asset
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketingAsset'
        '400':
          description: Invalid ID supplied
        '401':
          description: Not authorized

  /marketing_asset:
    get:
      tags:
        - marketing_asset
      summary: Find asset by specified criteria
      description: A marketing asset contains the original source file as well as the rendered image
      operationId: findAssets
      parameters:
        - name: filter_param
          in: query
          description: Limit the returned results using specified criteria
          required: false
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MarketingAsset'
        '400':
          description: Invalid status value
    post:
      tags:
        - marketing_asset
      summary: Create marketing asset
      description: A marketing asset contains the original source file as well as the rendered image
      operationId: createAsset
      requestBody:
        description: Create an asset
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketingAsset'
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MarketingAsset'
        '400':
          description: Invalid status value

components:
  schemas:
    Collection:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
          example: Spring 2025
        active:
          type: boolean
          example: true
        created:
          type: string
        modified:
          type: string
        concept:
          type: array
          items:
            type: string
            format: uuid  # or remove if not UUIDs
          description: |
            An array of string IDs referencing the image API.
        color:
          type: array
          items:
            type: string
            format: uuid  # or remove if not UUIDs
          description: |
            An array of string IDs referencing the color API.
        graphic:
          type: array
          items:
            type: string
            format: uuid  # or remove if not UUIDs
          description: |
            An array of string IDs referencing the graphic API.
        marketing_asset:
          type: array
          items:
            type: string
            format: uuid  # or remove if not UUIDs
          description: |
            An array of string IDs referencing the marketing asset API.
        outfit:
          type: array
          items:
            type: string
            format: uuid  # or remove if not UUIDs
          description: |
            An array of string IDs referencing the outfit API.
        print:
          type: array
          items:
            type: string
            format: uuid  # or remove if not UUIDs
          description: |
            An array of string IDs referencing the print API.
    Color:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
          example: Candy Red
        code:
          type: string
          example: 655
        color_provider:
          type: string
          example: Pantone
        color_provider_ref:
          type: string
          example: TBD
        hex_code:
          type: string
          example: "#D21404"
    Image:
      type: object
      properties:
        _id:
          type: string
        file_name_os:
          type: string
          example: 123.png
        code:
          type: string
          example: abc123
        shipDate:
          type: string
        is_option:
          type: boolean
        send_to_closet:
          type: boolean
    MarketingAsset:
      type: object
      properties:
        prompt:
          type: string
          example: "Professional photo of a girl wearing an outfit"
        file_name_os:
          type: string
          example: abcd1234.png
        retain_elements:
          type: string
          example: shirt,shoes